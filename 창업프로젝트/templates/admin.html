<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>관리자 페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f0f3fa;
        }
        .admin-box {
            max-width: 900px;
            margin: 50px auto;
            background: #fff;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }
        h3 {
            font-weight: 700;
            margin-bottom: 24px;
        }
        .menu-btn {
            padding: 16px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="admin-box">
        <h3>🔧 관리자 페이지</h3>

        <div class="row g-3">
            <div class="col-md-4">
                <a href="{{ url_for('admin_users') }}" class="btn btn-outline-primary w-100 menu-btn">👤 사용자 관리</a>
            </div>
            <div class="col-md-4">
                <a href="{{ url_for('admin_schedules') }}" class="btn btn-outline-success w-100 menu-btn">📅 일정 관리</a>
            </div>
            <div class="col-md-4">
                <a href="{{ url_for('admin_logs') }}" class="btn btn-outline-warning w-100 menu-btn">📄 로그 보기</a>
            </div>
        </div>

        <div class="mt-4 text-end">
            <a href="{{ url_for('logout') }}" class="btn btn-secondary">로그아웃</a>
        </div>
    </div>

</body>
</html>
