<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>관리 로그</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6fb; }
.box {
    background:#fff; padding:20px; border-radius:14px;
    margin-top:20px; box-shadow:0 3px 12px rgba(0,0,0,.06);
}
</style>

</head>

<body>

<div class="container mt-3">
    <a href="{{ url_for('admin_page') }}" class="btn btn-outline-secondary mb-3">〈 관리자 홈</a>

    <div class="box">
        <h4 class="fw-bold">📝 관리자 로그 기록</h4>

        <table class="table table-hover mt-3">
            <thead class="table-light">
                <tr>
                    <th>사용자</th>
                    <th>행동</th>
                    <th>내용</th>
                    <th>시간</th>
                </tr>
            </thead>

            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log[0] }}</td>
                    <td>{{ log[1] }}</td>
                    <td>{{ log[2] }}</td>
                    <td>{{ log[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>
</div>

</body>
</html>
