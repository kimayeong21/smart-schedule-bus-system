<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef2f9;
        }
        .signup-card {
            max-width: 460px;
            margin: 120px auto;
            padding: 34px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
        }
        h3 {
            font-weight: 700;
            margin-bottom: 24px;
        }
        .error-box {
            padding: 10px;
            background: #fdeaea;
            color: #d9534f;
            border-radius: 8px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <h3>📝 회원가입</h3>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">이름</label>
                <input type="text" class="form-control" name="name" placeholder="이름 입력">
            </div>

            <div class="mb-3">
                <label class="form-label">아이디</label>
                <input type="text" class="form-control" name="username" placeholder="아이디 입력">
            </div>

            <div class="mb-3">
                <label class="form-label">비밀번호</label>
                <input type="password" class="form-control" name="password" placeholder="비밀번호 입력">
            </div>

            <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" name="is_admin" id="adminCheck">
                <label class="form-check-label" for="adminCheck">
                    관리자 계정으로 가입 (대문자 + 숫자만 허용)
                </label>
            </div>

            <button class="btn btn-primary w-100 mt-3">회원가입</button>
        </form>

        <div class="mt-3 text-center">
            <a href="{{ url_for('login') }}">로그인으로 돌아가기</a>
        </div>
    </div>

</body>
</html>
