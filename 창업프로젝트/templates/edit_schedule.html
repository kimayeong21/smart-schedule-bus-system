<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>일정 수정</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
  <div class="container w-50">
    <h4>✏ 일정 수정</h4>
    <form method="post">
      <div class="mb-2"><label>일정 제목:</label><input type="text" name="title" class="form-control" required></div>
      <div class="mb-2"><label>날짜:</label><input type="date" name="date" class="form-control" required></div>
      <div class="mb-2"><label>장소:</label><input type="text" name="place" class="form-control"></div>
      <button class="btn btn-success w-100">수정</button>
    </form>
    {% if msg %}<div class="alert alert-success mt-3">{{ msg }}</div>{% endif %}
  </div>
</body>
</html>
