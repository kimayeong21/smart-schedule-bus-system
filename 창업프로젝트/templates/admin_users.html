<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>관리자 - 사용자 목록</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6fb; }

.top-bar {
    background:#fff; padding:16px 24px;
    border-bottom:1px solid #dfe3ee;
    display:flex; justify-content:space-between; align-items:center;
}

.card-box {
    background:#fff;
    padding:20px;
    border-radius:14px;
    margin-top:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.06);
}
</style>
</head>

<body>

<div class="top-bar">
    <h4 class="fw-bold">👑 관리자 - 사용자 관리</h4>
    <a href="{{ url_for('calendar') }}" class="btn btn-outline-secondary">〈 돌아가기</a>
</div>

<div class="container">
<div class="card-box">

    <table class="table table-hover align-middle">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>아이디</th>
                <th>이름</th>
                <th>권한</th>
                <th></th>
            </tr>
        </thead>

        <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u[0] }}</td>
                <td>{{ u[1] }}</td>
                <td>{{ u[2] }}</td>
                <td>{{ u[3] }}</td>
                <td>
                    <a href="/admin/user/{{ u[0] }}" class="btn btn-sm btn-primary">상세보기</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
</div>

</body>
</html>
