<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>🚌 전체 실시간 버스 조회</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#eef3f8; }
        .card-box {
            background:white; border-radius:16px;
            box-shadow:0 4px 10px rgba(0,0,0,0.05);
            padding:22px; margin-bottom:20px;
        }
        .live-row { 
            border-left:6px solid #0d6efd; 
            padding-left:12px;
            margin-bottom:15px;
            background:#f7faff;
            border-radius:10px;
        }
    </style>
</head>

<body class="p-3">

<div class="container">

    <div class="d-flex justify-content-between mb-3">
        <h3>🚌 전체 실시간 버스 조회</h3>
        <div>
            <a href="/bus" class="btn btn-outline-primary">기본 조회</a>
            <a href="/calendar" class="btn btn-outline-dark">일정</a>
            <a href="/" class="btn btn-dark">메인</a>
        </div>
    </div>


    <!-- 검색 -->
    <div class="card-box">
        <h5>🔍 버스 번호 입력</h5>
        <div class="row mt-2">
            <div class="col-8">
                <input id="busInput" class="form-control" placeholder="예) 811-1">
            </div>
            <div class="col-4">
                <button id="btnLoad" class="btn btn-primary w-100">조회</button>
            </div>
        </div>

        <div class="form-check form-switch mt-3">
            <input class="form-check-input" id="auto" type="checkbox">
            <label class="form-check-label" for="auto">⏱ 자동 새로고침</label>
        </div>
    </div>


    <!-- 결과 -->
    <div id="resultBox" class="card-box" style="display:none;">
        <h4 id="title"></h4>
        <small class="text-muted">전체 경유 정류장 기준 실시간 조회</small>

        <div id="liveList" class="mt-3"></div>
    </div>

</div>


<script>
let timer = null;

// 조회
document.getElementById("btnLoad").onclick = loadLive;

function loadLive() {
    const busNo = document.getElementById("busInput").value.trim();
    if (!busNo) return;

    fetch(`/bus/live?bus_no=${busNo}`)
        .then(r => r.json())
        .then(data => {
            if (!data.ok) {
                alert("버스를 찾을 수 없습니다");
                return;
            }

            document.getElementById("title").innerText = `${busNo}번 실시간 위치/도착`;
            document.getElementById("resultBox").style.display = "";

            const box = document.getElementById("liveList");
            box.innerHTML = "";

            if (data.live.length === 0) {
                box.innerHTML = `<div class="mt-3 text-muted">실시간 도착 정보 없음</div>`;
                return;
            }

            data.live.forEach(item => {
                box.innerHTML += `
                    <div class="live-row">
                        <div><b>${item.stop}</b></div>
                        <div class="text-primary">${item.arrival}</div>
                    </div>
                `;
            });
        });
}


// 자동 새로고침
document.getElementById("auto").onchange = function () {
    if (this.checked) {
        timer = setInterval(loadLive, 13000);
    } else {
        clearInterval(timer);
    }
};
</script>

</body>
</html>
