{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold">🗓 전체 일정 관리</h4>
    <a href="{{ url_for('admin_page') }}" class="btn btn-outline-dark btn-soft">관리자 홈</a>
  </div>

  <div class="card card-soft p-3">
    <table class="table table-hover align-middle">
      <thead>
        <tr>
          <th>사용자</th><th>제목</th><th>날짜</th><th>장소</th><th></th>
        </tr>
      </thead>
      <tbody>
      {% for it in items %}
        <tr>
          <td>{{ it[0] }}</td>
          <td>{{ it[1] }}</td>
          <td>{{ it[2] }}</td>
          <td>{{ it[3] }}</td>
          <td>
            <a class="btn btn-sm btn-danger btn-soft"
               href="{{ url_for('admin_delete_schedule', sid=it[4]) }}"
               onclick="return confirm('삭제할까요?')">삭제</a>
          </td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
