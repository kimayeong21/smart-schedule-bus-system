<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>{{ title or "청주 버스 + 일정 통합" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <style>
    body { background:#f7f9fc; }
    .card-soft { border:1px solid #e7ecf3; border-radius:18px; box-shadow:0 6px 18px rgba(13,38,76,.06); }
    .btn-soft { border-radius:12px; }
    .main-frame {
      max-width: 520px; margin: 60px auto; padding: 44px 34px;
      background:white; border:2px solid #1f3b73; border-radius:26px;
    }
    .calendar-wrap { background:white; border-radius:16px; padding:16px; border:1px solid #e9eef6; }
    .calendar-grid { width:100%; border-collapse:collapse; table-layout:fixed; }
    .calendar-grid th, .calendar-grid td {
      border:1px solid #dfe6f1; height:92px; vertical-align:top; padding:6px; font-size:14px;
    }
    .calendar-grid th { background:#f0f4fb; text-align:center; font-weight:700; }
    .day-num { font-weight:700; margin-bottom:4px; }
    .event-pill {
      font-size:12px; background:#e8f0ff; border:1px solid #cfe0ff;
      padding:2px 6px; border-radius:999px; margin-bottom:4px; cursor:pointer;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .tab-btn { min-width:110px; font-weight:700; }
    .msg-box { background:#dff3ff; border-radius:10px; padding:14px; }
    .admin-side {
      min-height: 520px; background:white; border-radius:16px; border:1px solid #e9eef6; padding:16px;
    }
    .admin-side a { display:block; padding:10px 12px; border-radius:10px; text-decoration:none; color:#124; }
    .admin-side a:hover { background:#f1f5ff; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block script %}{% endblock %}
</body>
</html>
