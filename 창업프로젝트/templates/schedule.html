<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>📅 일정 관리</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h3 class="mb-3">📅 {{ session.username }}님의 일정 관리</h3>
    <a href="{{ url_for('calendar') }}" class="btn btn-outline-secondary btn-sm mb-3">← 달력으로 돌아가기</a>

    {% if msg %}
      <div class="alert alert-info">{{ msg }}</div>
    {% endif %}

    <div class="card mb-4">
      <div class="card-header">➕ 새 일정 추가</div>
      <div class="card-body">
        <form method="post">
          <input type="hidden" name="action" value="add">
          <div class="row g-2">
            <div class="col-md-3"><input type="date" name="date" class="form-control" required></div>
            <div class="col-md-4"><input type="text" name="title" placeholder="일정 제목" class="form-control" required></div>
            <div class="col-md-4"><input type="text" name="place" placeholder="장소" class="form-control"></div>
            <div class="col-md-1"><button class="btn btn-primary w-100">등록</button></div>
          </div>
        </form>
      </div>
    </div>

    <h5>📋 등록된 일정 목록</h5>
    <table class="table table-bordered table-striped">
      <thead class="table-light">
        <tr><th>ID</th><th>날짜</th><th>제목</th><th>장소</th><th>수정 / 삭제</th></tr>
      </thead>
      <tbody>
      {% for s in schedules %}
        <tr>
          <form method="post">
            <td><input type="hidden" name="id" value="{{ s[0] }}">{{ s[0] }}</td>
            <td><input type="date" name="date" value="{{ s[2] }}" class="form-control"></td>
            <td><input type="text" name="title" value="{{ s[1] }}" class="form-control"></td>
            <td><input type="text" name="place" value="{{ s[3] or '' }}" class="form-control"></td>
            <td class="text-center">
              <button name="action" value="update" class="btn btn-success btn-sm">수정</button>
              <button name="action" value="delete" class="btn btn-danger btn-sm">삭제</button>
            </td>
          </form>
        </tr>
      {% else %}
        <tr><td colspan="5" class="text-center text-muted">등록된 일정이 없습니다.</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
