<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>전체 일정 관리</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6fb; }
.box {
    background:#fff; padding:20px; border-radius:14px;
    margin-top:20px; box-shadow:0 3px 12px rgba(0,0,0,.05);
}
</style>
</head>

<body>

<div class="container mt-3">
    <a href="{{ url_for('admin_page') }}" class="btn btn-outline-secondary mb-3">〈 관리자 홈</a>

    <div class="box">
        <h4 class="fw-bold">📅 전체 일정 관리</h4>

        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>사용자</th>
                    <th>제목</th>
                    <th>날짜</th>
                    <th>장소</th>
                    <th>삭제</th>
                </tr>
            </thead>

            <tbody>
                {% for i in items %}
                <tr>
                    <td>{{ i[0] }}</td>
                    <td>{{ i[1] }}</td>
                    <td>{{ i[2] }}</td>
                    <td>{{ i[3] }}</td>
                    <td>
                        <a href="/admin/schedule/delete/{{ i[4] }}" class="btn btn-danger btn-sm">삭제</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>
</div>

</body>
</html>
