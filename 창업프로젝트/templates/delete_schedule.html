<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>일정 삭제</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
  <div class="container w-50">
    <h4>🗑 일정 삭제</h4>
    <form method="post">
      <div class="mb-2"><label>삭제할 일정 제목:</label><input type="text" name="title" class="form-control" required></div>
      <button class="btn btn-danger w-100">삭제</button>
    </form>
    {% if msg %}<div class="alert alert-danger mt-3">{{ msg }}</div>{% endif %}
  </div>
</body>
</html>
