<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>사용자 상세정보</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6fb; }
.box {
    background:#fff; padding:20px; border-radius:14px;
    margin-top:20px; box-shadow:0 4px 12px rgba(0,0,0,.05);
}
</style>
</head>

<body>

<div class="container mt-3">
    <a href="{{ url_for('admin_users') }}" class="btn btn-outline-secondary mb-3">〈 사용자 목록</a>

    <div class="box">
        <h4 class="fw-bold">{{ user[2] }} 님 정보</h4>
        <p><b>아이디:</b> {{ user[1] }}</p>
        <p><b>권한:</b> {{ user[3] }}</p>
    </div>

    <div class="box">
        <h5 class="fw-bold">📅 등록된 일정</h5>

        <table class="table">
            <thead>
                <tr>
                    <th>제목</th>
                    <th>날짜</th>
                    <th>장소</th>
                </tr>
            </thead>
            <tbody>
                {% for s in schedules %}
                <tr>
                    <td>{{ s[0] }}</td>
                    <td>{{ s[1] }}</td>
                    <td>{{ s[2] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
