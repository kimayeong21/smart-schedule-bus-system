<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>스마트 일정 & 버스 관리 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f0f3fa;
        }
        .main-card {
            max-width: 520px;
            margin: 120px auto;
            padding: 36px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
            text-align: center;
        }
        .title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .sub {
            color: #6c7a91;
            margin-bottom: 28px;
        }
        .btn-big {
            padding: 12px;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="title">📅 스마트 일정 & 🚌 버스 시스템</div>
        <div class="sub">로그인하여 실시간 버스와 일정을 관리하세요.</div>

        <a href="{{ url_for('login') }}" class="btn btn-primary w-100 btn-big">로그인</a>
        <a href="{{ url_for('signup') }}" class="btn btn-outline-secondary w-100 btn-big">회원가입</a>
    </div>

</body>
</html>
